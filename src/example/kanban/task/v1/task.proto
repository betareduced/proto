edition = "2023";

package example.kanban.task.v1;

import "buf/validate/validate.proto";
import "common/wkt/v1/record_timestamps.proto";

option go_package = "github.com/betareduced/proto/go/example/kanban/task/v1;taskpb";
option java_multiple_files = true;
option java_package = "com.betareduced.proto.example.kanban.task.v1";

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
}

enum Status {
  BACKLOG = 0;
  READY = 1;
  DOING = 2;
  REVIEW = 3;
  DONE = 4;
  ARCHIVED = 5;
}

message Task {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string desc = 3 [(buf.validate.field).string.max_len = 4000];
  Status status = 4 [(buf.validate.field).enum.defined_only = true];
  common.wkt.v1.RecordTimestamps timestamps = 5;
}

message CreateTaskRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string desc = 2 [(buf.validate.field).string.max_len = 4000];
}

message CreateTaskResponse {
  Task task = 1 [(buf.validate.field).required = true];
}
