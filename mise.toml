[tools]
buf = "1.68.2"
go = "1.26.2"
gradle = "9.3.0"
java = "25"
node = "24"
protoc-gen-go = "1.36.11"
protoc-gen-go-grpc = "1.6.1"
"go:connectrpc.com/connect/cmd/protoc-gen-connect-go" = "1.19.2"
"npm:typescript" = "latest"
"npm:@bufbuild/protoc-gen-es" = "latest"
"npm:zx" = "latest"
"go:github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2" = "latest"
"go:github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway" = "latest"

[tasks.tidy]
run = [
    "buf lint",
    "buf format -w"
]

[tasks.gen]
run = [
    "buf generate",
    "go -C go mod tidy"
]
depends = ["tidy"]

[tasks.release]
usage = '''
arg "<version>" help="Semver to release, e.g. 0.2.0 (a leading 'v' is stripped)"
'''
run = "zx scripts/release.mjs ${usage_version?}"

[tasks."verify:proto"]
run = [
    "buf lint",
    "buf format --diff --exit-code",
]

[tasks."verify:go"]
run = [
    "go -C go build ./...",
    "go -C go vet ./...",
]

[tasks."verify:java"]
dir = "java"
run = "./gradlew --no-daemon build"

[tasks."verify:web"]
dir = "web"
run = [
    "npm ci --silent",
    "npm run build",
]

[tasks.verify]
depends = ["verify:proto", "verify:go", "verify:java", "verify:web"]
