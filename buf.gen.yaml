version: v2
plugins:
  - local: protoc-gen-go
    out: go
    opt: [paths=source_relative]
  - local: protoc-gen-go-grpc
    out: go
    opt: [paths=source_relative, require_unimplemented_servers=false]
  - remote: buf.build/protocolbuffers/java:v34.1
    out: java/src/main/java
  - remote: buf.build/grpc/java:v1.80.0
    out: java/src/main/java
  - local: protoc-gen-es
    out: web
    include_imports: true
    opt: [target=ts, import_extension=ts]