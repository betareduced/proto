version: v2
plugins:
  - local: protoc-gen-go
    out: go
    opt: [paths=source_relative]
  - local: protoc-gen-go-grpc
    out: go
    opt: [paths=source_relative, require_unimplemented_servers=false]
  - local: protoc-gen-connect-go
    out: go
    opt: [paths=source_relative]
  - remote: buf.build/protocolbuffers/java:v34.1
    out: java/src/main/java
  - remote: buf.build/grpc/java:v1.80.0
    out: java/src/main/java
  - local: protoc-gen-es
    out: web
    include_imports: true
    opt: [target=ts, import_extension=ts]
  - local: protoc-gen-grpc-gateway
    out: gen/proto
    opt: [ paths=source_relative, generate_unbound_methods=true ]
  - local: protoc-gen-openapiv2
    out: openapi
    opt:
      - allow_merge=false
      - generate_unbound_methods=true
      - fqn_for_openapi_name=true
