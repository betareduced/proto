name: Publish Web

on:
  push:
    tags:
      - 'web/**'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@betareduced'

      - name: Resolve version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"           # e.g. web/0.1.0
          version="${tag#web/}"
          version="${version#v}"                   # tolerate web/v0.1.0
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.+-][A-Za-z0-9.+-]+)?$'; then
            echo "tag '$tag' is not a valid semver: '$version'" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing Web version: $version"

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: npm pkg set version="${{ steps.version.outputs.version }}"

      - name: Build
        run: npm run build

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
